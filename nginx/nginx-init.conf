# Nginx bootstrap config — HTTP only (no SSL)
# Used during initial certificate provisioning before certs exist.
# After certbot obtains certs, switch to the full nginx.conf.

server {
    listen 80;
    server_name ${DOMAIN_NAME};

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Proxy everything else to checkout-api (HTTP only, until certs are ready)
    location / {
        proxy_pass http://checkout-api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
