version: '3.8'

services:
  # ─── Acme Commerce API ───────────────────────────────
  checkout-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - APP_VERSION=${APP_VERSION:-1.0.0}
      - APP_SCENARIO=${APP_SCENARIO:-healthy}
      # Sentry
      - SENTRY_DSN=${SENTRY_DSN}
      - SENTRY_ENVIRONMENT=${SENTRY_ENVIRONMENT:-prod}
      - SENTRY_RELEASE=${SENTRY_RELEASE:-acme-checkout@1.0.0}
      - SENTRY_ORG_SLUG=${SENTRY_ORG_SLUG:-}
      - SENTRY_PROJECT_ID=${SENTRY_PROJECT_ID:-}
      - SENTRY_CLIENT_SECRET=${SENTRY_CLIENT_SECRET:-}
      # Datadog
      - DD_ENV=${DD_ENV:-prod}
      - DD_SERVICE=${DD_SERVICE:-checkout-api}
      - DD_VERSION=${DD_VERSION:-1.0.0}
      - DD_AGENT_HOST=datadog-agent
      - DD_TRACE_AGENT_PORT=8126
      - DD_DOGSTATSD_PORT=8125
      - DD_DASHBOARD_URL=${DD_DASHBOARD_URL:-}
      # GitHub
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET:-}
      - GITHUB_PAT=${GITHUB_PAT:-}
      # Devin API (for auto-investigation via Sentry webhooks)
      - DEVIN_SERVICE_KEY=${DEVIN_SERVICE_KEY:-}
      - DEVIN_API_KEY=${DEVIN_API_KEY:-}
      - DEVIN_ORG_ID=${DEVIN_ORG_ID:-}
      - DEVIN_ORG_NAME=${DEVIN_ORG_NAME:-}
      # Slack (alert notifications)
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
      - SLACK_CHANNEL_ID=${SLACK_CHANNEL_ID:-}
      - SLACK_USER_TOKEN=${SLACK_USER_TOKEN:-}
      # Devin trigger mode: "slack" (default, via @mention) or "api" (direct API)
      - DEVIN_TRIGGER_MODE=${DEVIN_TRIGGER_MODE:-slack}
      - DEVIN_SLACK_USER_ID=${DEVIN_SLACK_USER_ID:-}
      - DEVIN_PLAYBOOK_ID=${DEVIN_PLAYBOOK_ID:-}
      # Session creation verification
      - SESSION_SECRET=${SESSION_SECRET:-}
      # SonarCloud remediation target
      - SONAR_TARGET_REPO=${SONAR_TARGET_REPO:-}
      # Deployment configuration
      - GITHUB_ORG=${GITHUB_ORG:-}
      - APP_TITLE=${APP_TITLE:-}
      - LOCK_ORG=${LOCK_ORG:-}
      - DEVIN_USER_ID=${DEVIN_USER_ID:-}
      # Per-customer overrides (add _<SLUG> suffixed vars as needed)
      - DEVIN_API_KEY_A6B38C63=${DEVIN_API_KEY_A6B38C63:-}
      - DEVIN_PLAYBOOK_ID_A6B38C63=${DEVIN_PLAYBOOK_ID_A6B38C63:-}
      - SONAR_TARGET_REPO_A6B38C63=${SONAR_TARGET_REPO_A6B38C63:-}
      - DEVIN_API_KEY_EF5D1DC1=${DEVIN_API_KEY_EF5D1DC1:-}
      - DEVIN_PLAYBOOK_ID_EF5D1DC1=${DEVIN_PLAYBOOK_ID_EF5D1DC1:-}
      - SONAR_TARGET_REPO_EF5D1DC1=${SONAR_TARGET_REPO_EF5D1DC1:-}
      - DEVIN_SERVICE_KEY_E0C16510=${DEVIN_SERVICE_KEY_E0C16510:-}
      - DEVIN_SERVICE_KEY_ACF4303D=${DEVIN_SERVICE_KEY_ACF4303D:-}
      - DEVIN_SERVICE_KEY_53A9884E=${DEVIN_SERVICE_KEY_53A9884E:-}
      - DEVIN_SERVICE_KEY_F3FF1D33=${DEVIN_SERVICE_KEY_F3FF1D33:-}
      - DEVIN_USER_ID_ACF4303D=${DEVIN_USER_ID_ACF4303D:-}
      - DEVIN_USER_ID_53A9884E=${DEVIN_USER_ID_53A9884E:-}
      - DEVIN_USER_ID_F3FF1D33=${DEVIN_USER_ID_F3FF1D33:-}
      - DEVIN_SERVICE_KEY_430A4200=${DEVIN_SERVICE_KEY_430A4200:-}
      - DEVIN_USER_ID_430A4200=${DEVIN_USER_ID_430A4200:-}
      - DEVIN_SERVICE_KEY_B62FA21D=${DEVIN_SERVICE_KEY_B62FA21D:-}
      - DEVIN_USER_ID_B62FA21D=${DEVIN_USER_ID_B62FA21D:-}
      - DEVIN_SERVICE_KEY_F2F54159=${DEVIN_SERVICE_KEY_F2F54159:-}
      - DEVIN_USER_ID_F2F54159=${DEVIN_USER_ID_F2F54159:-}
      - DEVIN_SERVICE_KEY_304DB83F=${DEVIN_SERVICE_KEY_304DB83F:-}
      - DEVIN_USER_ID_304DB83F=${DEVIN_USER_ID_304DB83F:-}
      - DEVIN_SERVICE_KEY_1A459B91=${DEVIN_SERVICE_KEY_1A459B91:-}
      - DEVIN_USER_ID_1A459B91=${DEVIN_USER_ID_1A459B91:-}
      - DEVIN_SERVICE_KEY_BEB4D43E=${DEVIN_SERVICE_KEY_BEB4D43E:-}
      - DEVIN_USER_ID_BEB4D43E=${DEVIN_USER_ID_BEB4D43E:-}
      - DEVIN_SERVICE_KEY_4FEEB7BB=${DEVIN_SERVICE_KEY_4FEEB7BB:-}
      - DEVIN_USER_ID_4FEEB7BB=${DEVIN_USER_ID_4FEEB7BB:-}
      - DEVIN_SERVICE_KEY_89C1F355=${DEVIN_SERVICE_KEY_89C1F355:-}
      - DEVIN_USER_ID_89C1F355=${DEVIN_USER_ID_89C1F355:-}
      - DEVIN_SERVICE_KEY_99A8BA1A=${DEVIN_SERVICE_KEY_99A8BA1A:-}
      - DEVIN_USER_ID_99A8BA1A=${DEVIN_USER_ID_99A8BA1A:-}
      - DEVIN_SERVICE_KEY_B3E22436=${DEVIN_SERVICE_KEY_B3E22436:-}
      - DEVIN_USER_ID_B3E22436=${DEVIN_USER_ID_B3E22436:-}
      - DEVIN_SERVICE_KEY_A6B38C63=${DEVIN_SERVICE_KEY_A6B38C63:-}
      - DEVIN_USER_ID_A6B38C63=${DEVIN_USER_ID_A6B38C63:-}
      - DEVIN_SERVICE_KEY_EF5D1DC1=${DEVIN_SERVICE_KEY_EF5D1DC1:-}
      - DEVIN_USER_ID_EF5D1DC1=${DEVIN_USER_ID_EF5D1DC1:-}
      - DEVIN_SERVICE_KEY_D5FC3172=${DEVIN_SERVICE_KEY_D5FC3172:-}
      - DEVIN_USER_ID_D5FC3172=${DEVIN_USER_ID_D5FC3172:-}
      - DEVIN_SERVICE_KEY_BBVA=${DEVIN_SERVICE_KEY_BBVA:-}
      - DEVIN_USER_ID_BBVA=${DEVIN_USER_ID_BBVA:-}
    depends_on:
      - datadog-agent
    restart: unless-stopped
    # Allow in-flight requests to drain before the container is killed
    stop_grace_period: 15s
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─── Nginx Reverse Proxy (SSL termination) ────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/templates/default.conf.template:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME:-localhost}
      # Only substitute DOMAIN_NAME — leave nginx variables ($host, $scheme, etc.) untouched
      - NGINX_ENVSUBST_FILTER=DOMAIN_NAME
    depends_on:
      checkout-api:
        condition: service_healthy
    restart: unless-stopped

  # ─── Certbot (Let's Encrypt certificate renewal) ──────
  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    # Check for renewal every 12 hours; reload nginx after each attempt
    entrypoint: >-
      /bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; wget -qO- http://nginx:80/ > /dev/null 2>&1; sleep 12h & wait $${!}; done'
    depends_on:
      - nginx
    restart: unless-stopped

  # ─── Traffic Generator ───────────────────────────────
  loadgen:
    build:
      context: .
      dockerfile: Dockerfile.loadgen
    environment:
      - LOADGEN_TARGET_URL=http://checkout-api:3000
      - LOADGEN_INTERVAL_MS=${LOADGEN_INTERVAL_MS:-60000}
    depends_on:
      checkout-api:
        condition: service_healthy
    restart: unless-stopped

  # ─── Datadog Agent ──────────────────────────────────
  datadog-agent:
    image: gcr.io/datadoghq/agent:7
    environment:
      - DD_API_KEY=${DD_API_KEY}
      - DD_SITE=${DD_SITE:-datadoghq.com}
      - DD_APM_ENABLED=true
      - DD_APM_NON_LOCAL_TRAFFIC=true
      - DD_DOGSTATSD_NON_LOCAL_TRAFFIC=true
      - DD_LOGS_ENABLED=true
      - DD_LOGS_CONFIG_CONTAINER_COLLECT_ALL=true
      - DD_CONTAINER_EXCLUDE="name:datadog-agent"
      - DD_PROCESS_AGENT_ENABLED=true
    ports:
      - "8126:8126"   # APM traces
      - "8125:8125/udp" # DogStatsD
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc/:/host/proc/:ro
      - /sys/fs/cgroup/:/host/sys/fs/cgroup:ro
    restart: unless-stopped
