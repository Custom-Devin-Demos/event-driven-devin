version: '3.8'

services:
  # в”Ђв”Ђв”Ђ Acme Commerce API в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  checkout-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - APP_VERSION=${APP_VERSION:-1.0.0}
      - APP_SCENARIO=${APP_SCENARIO:-healthy}
      # Sentry
      - SENTRY_DSN=${SENTRY_DSN}
      - SENTRY_ENVIRONMENT=${SENTRY_ENVIRONMENT:-prod}
      - SENTRY_RELEASE=${SENTRY_RELEASE:-acme-checkout@1.0.0}
      # Datadog
      - DD_ENV=${DD_ENV:-prod}
      - DD_SERVICE=${DD_SERVICE:-checkout-api}
      - DD_VERSION=${DD_VERSION:-1.0.0}
      - DD_AGENT_HOST=datadog-agent
      - DD_TRACE_AGENT_PORT=8126
      - DD_DOGSTATSD_PORT=8125
      # GitHub
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET:-}
      - GITHUB_PAT=${GITHUB_PAT:-}
      # Devin API (for auto-investigation via Sentry webhooks)
      - DEVIN_SERVICE_KEY=${DEVIN_SERVICE_KEY:-}
      - DEVIN_API_KEY=${DEVIN_API_KEY:-}
      - DEVIN_ORG_ID=${DEVIN_ORG_ID:-}
      - DEVIN_ORG_NAME=${DEVIN_ORG_NAME:-}
      # Slack (alert notifications)
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
      - SLACK_CHANNEL_ID=${SLACK_CHANNEL_ID:-}
      - SLACK_USER_TOKEN=${SLACK_USER_TOKEN:-}
      # Devin trigger mode: "slack" (default, via @mention) or "api" (direct API)
      - DEVIN_TRIGGER_MODE=${DEVIN_TRIGGER_MODE:-slack}
      - DEVIN_SLACK_USER_ID=${DEVIN_SLACK_USER_ID:-}
      - DEVIN_PLAYBOOK_ID=${DEVIN_PLAYBOOK_ID:-}
      # SonarCloud remediation target
      - SONAR_TARGET_REPO=${SONAR_TARGET_REPO:-}
      # Per-customer overrides (add _<SLUG> suffixed vars as needed)
      - DEVIN_API_KEY_WAYFAIR=${DEVIN_API_KEY_WAYFAIR:-}
      - DEVIN_PLAYBOOK_ID_WAYFAIR=${DEVIN_PLAYBOOK_ID_WAYFAIR:-}
      - SONAR_TARGET_REPO_WAYFAIR=${SONAR_TARGET_REPO_WAYFAIR:-}
      - DEVIN_API_KEY_ZAXBYS=${DEVIN_API_KEY_ZAXBYS:-}
      - DEVIN_PLAYBOOK_ID_ZAXBYS=${DEVIN_PLAYBOOK_ID_ZAXBYS:-}
      - SONAR_TARGET_REPO_ZAXBYS=${SONAR_TARGET_REPO_ZAXBYS:-}
    depends_on:
      - datadog-agent
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # в”Ђв”Ђв”Ђ Nginx Reverse Proxy (SSL termination) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/templates/default.conf.template:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME:-localhost}
      # Only substitute DOMAIN_NAME вЂ” leave nginx variables ($host, $scheme, etc.) untouched
      - NGINX_ENVSUBST_FILTER=DOMAIN_NAME
    depends_on:
      checkout-api:
        condition: service_healthy
    restart: unless-stopped

  # в”Ђв”Ђв”Ђ Certbot (Let's Encrypt certificate renewal) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    # Check for renewal every 12 hours; reload nginx after each attempt
    entrypoint: >-
      /bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; wget -qO- http://nginx:80/ > /dev/null 2>&1; sleep 12h & wait $${!}; done'
    depends_on:
      - nginx
    restart: unless-stopped

  # в”Ђв”Ђв”Ђ Traffic Generator в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  loadgen:
    build:
      context: .
      dockerfile: Dockerfile.loadgen
    environment:
      - LOADGEN_TARGET_URL=http://checkout-api:3000
      - LOADGEN_INTERVAL_MS=${LOADGEN_INTERVAL_MS:-60000}
    depends_on:
      checkout-api:
        condition: service_healthy
    restart: unless-stopped

  # в”Ђв”Ђв”Ђ Datadog Agent в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  datadog-agent:
    image: gcr.io/datadoghq/agent:7
    environment:
      - DD_API_KEY=${DD_API_KEY}
      - DD_SITE=${DD_SITE:-datadoghq.com}
      - DD_APM_ENABLED=true
      - DD_APM_NON_LOCAL_TRAFFIC=true
      - DD_DOGSTATSD_NON_LOCAL_TRAFFIC=true
      - DD_LOGS_ENABLED=true
      - DD_LOGS_CONFIG_CONTAINER_COLLECT_ALL=true
      - DD_CONTAINER_EXCLUDE="name:datadog-agent"
      - DD_PROCESS_AGENT_ENABLED=true
    ports:
      - "8126:8126"   # APM traces
      - "8125:8125/udp" # DogStatsD
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc/:/host/proc/:ro
      - /sys/fs/cgroup/:/host/sys/fs/cgroup:ro
    restart: unless-stopped
